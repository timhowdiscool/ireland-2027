# Netlify config — static site, no build step.
[build]
  publish = "."
  command = ""

# Sensible security + caching headers for a static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
